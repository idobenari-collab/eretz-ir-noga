<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ארץ עיר של נוגה 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #4FC3F7; --sun: #FFD54F; --grass: #66BB6A;
    --coral: #FF7043; --purple: #CE93D8; --dark: #2E3B2E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(160deg, #e0f7fa 0%, #f3e5f5 50%, #fff9c4 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 20px; overflow-x: hidden;
  }
  .bg-floats { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-floats span { position:absolute; animation: floatUp linear infinite; opacity:0.12; }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity:0; }
    10% { opacity:0.12; } 90% { opacity:0.12; }
    100% { transform: translateY(-120px) rotate(360deg); opacity:0; }
  }
  .container { position:relative; z-index:1; width:100%; max-width:620px; }
  header { text-align:center; margin-bottom:20px; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
  header h1 { font-family:'Fredoka One',cursive; font-size:2.6rem; color:var(--dark); line-height:1.1; text-shadow:3px 3px 0 rgba(0,0,0,0.07); }
  header h1 span { color:var(--coral); }
  header p { font-size:0.95rem; color:#666; margin-top:4px; }

  /* Logo area */
  .logo-wrap { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:6px; }
  .logo-img { width:64px; height:64px; border-radius:50%; object-fit:cover; border:3px solid var(--coral); box-shadow:0 4px 12px rgba(255,112,67,0.3); }
  .logo-placeholder { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--coral),var(--purple)); display:flex; align-items:center; justify-content:center; font-size:2rem; border:3px solid white; box-shadow:0 4px 12px rgba(255,112,67,0.3); }

  .card { background:white; border-radius:24px; padding:26px; box-shadow:0 8px 32px rgba(0,0,0,0.10); margin-bottom:16px; animation: slideUp 0.4s ease; }
  @keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  /* ===== LETTER SPIN MACHINE ===== */
  .spin-section { text-align:center; margin-bottom:22px; }
  .spin-drum-wrap {
    position:relative; display:inline-block;
    width:120px; height:120px; margin:0 auto 12px;
  }
  .spin-drum {
    width:120px; height:120px; border-radius:50%;
    background:linear-gradient(135deg,var(--coral),var(--purple));
    font-family:'Fredoka One',cursive; font-size:4.2rem; color:white;
    line-height:120px; text-align:center;
    box-shadow:0 6px 24px rgba(255,112,67,0.45);
    transition: transform 0.07s linear;
    user-select:none;
  }
  .spin-drum.spinning { animation: spinLetters 0.08s linear infinite; }
  @keyframes spinLetters {
    0% { filter: brightness(1.1); }
    50% { filter: brightness(0.9); }
    100% { filter: brightness(1.1); }
  }
  .spin-glow { position:absolute; inset:-6px; border-radius:50%; border:3px dashed rgba(255,112,67,0.4); animation:rotateBorder 3s linear infinite; }
  @keyframes rotateBorder { to { transform:rotate(360deg); } }

  .spin-countdown {
    font-family:'Fredoka One',cursive; font-size:1.1rem; color:#aaa;
    height:24px; margin-bottom:10px; transition:color 0.3s;
  }
  .spin-countdown.urgent { color:var(--coral); }

  .btn-spin {
    display:inline-block; padding:14px 36px;
    border-radius:99px; font-family:'Fredoka One',cursive;
    font-size:1.3rem; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--coral),#FF5252);
    color:white; box-shadow:0 4px 18px rgba(255,112,67,0.45);
    transition:transform 0.15s, box-shadow 0.15s;
    position:relative; overflow:hidden;
  }
  .btn-spin:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(255,112,67,0.55); }
  .btn-spin:active { transform:scale(0.97); }
  .btn-spin.ready { background:linear-gradient(135deg,#43A047,#66BB6A); box-shadow:0 4px 18px rgba(102,187,106,0.45); }

  /* Game timer */
  .timer-bar-wrap { margin:12px 0 4px; height:14px; background:#eee; border-radius:99px; overflow:hidden; }
  .timer-bar { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--grass),var(--sky)); transition:width 1s linear, background 1s; }
  .timer-bar.urgent { background:linear-gradient(90deg,var(--coral),var(--sun)); }
  .timer-text { font-size:0.85rem; color:#888; text-align:center; }

  /* Categories grid — 3 columns for 7 cats */
  .categories { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media(min-width:480px) { .categories { grid-template-columns:1fr 1fr 1fr; } }

  .cat-input { display:flex; flex-direction:column; gap:5px; }
  .cat-label { font-size:0.8rem; font-weight:600; color:#555; display:flex; align-items:center; gap:5px; }
  .cat-input input {
    border:2.5px solid #e0e0e0; border-radius:12px;
    padding:9px 12px; font-size:0.95rem;
    font-family:'Heebo',sans-serif; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s; text-align:right;
  }
  .cat-input input:focus { border-color:var(--coral); box-shadow:0 0 0 3px rgba(255,112,67,0.15); }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:13px 28px; border-radius:99px; font-family:'Fredoka One',cursive;
    font-size:1.15rem; border:none; cursor:pointer;
    transition:transform 0.15s, box-shadow 0.15s; width:100%; margin-top:14px;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:linear-gradient(135deg,var(--coral),#FF5252); color:white; box-shadow:0 4px 16px rgba(255,112,67,0.4); }
  .btn-primary:hover { transform:translateY(-2px); }
  .btn-secondary { background:linear-gradient(135deg,var(--sky),var(--purple)); color:white; }

  .score-bar {
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(135deg,#fff9c4,#ffe0b2);
    border-radius:16px; padding:12px 20px; margin-bottom:14px;
  }
  .score-item { text-align:center; }
  .score-num { font-family:'Fredoka One',cursive; font-size:1.7rem; color:var(--dark); line-height:1; }
  .score-label { font-size:0.75rem; color:#888; margin-top:2px; }

  .result-row { display:flex; align-items:center; gap:10px; padding:9px 13px; border-radius:12px; margin-bottom:7px; font-size:0.92rem; }
  .result-row.ok { background:#e8f5e9; color:#2e7d32; }
  .result-row.bad { background:#fce4ec; color:#c62828; }

  .win-screen { text-align:center; padding:16px 0; }
  .win-screen .big-emoji { font-size:5rem; display:block; margin-bottom:12px; animation:bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-12px); } }
  .win-screen h2 { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--dark); margin-bottom:8px; }

  .start-screen { text-align:center; padding:8px 0; }
  .cats-preview { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin:14px 0; }
  .cat-chip { background:linear-gradient(135deg,#f3e5f5,#e1f5fe); border-radius:99px; padding:5px 14px; font-size:0.85rem; font-weight:600; color:#555; }
  .round-label { font-size:0.8rem; color:#aaa; text-align:center; margin-bottom:8px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .letter-reveal { font-size:0.95rem; color:#555; margin-top:8px; font-weight:600; }
  .letter-reveal strong { color:var(--coral); font-family:'Fredoka One',cursive; font-size:1.2rem; }
</style>
</head>

function norm(s) {
  return (s||'').trim()
    .replace(/['"״׳`]/g,'')
    .replace(/\s+/g,' ')
    .toLowerCase();
}

// Levenshtein distance for fuzzy matching
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => Array.from({length: n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function checkAnswer(letter, category, answer) {
  if (!answer || !answer.trim()) return { ok:false, reason:'לא ענית' };
  const n = norm(answer);
  if (!n) return { ok:false, reason:'לא ענית' };
  const first = n[0];
  const map = {'ך':'כ','ם':'מ','ן':'נ','ף':'פ','ץ':'צ'};
  const eff = map[first]||first;
  if (eff !== letter) return { ok:false, reason:'לא מתחיל ב-' + letter };

  const pool = (DB[category][letter]||[]);
  const normPool = pool.map(w => norm(w));

  // Exact match
  if (normPool.includes(n)) return { ok:true, reason:'נכון!' };

  // Fuzzy match
  const maxDist = n.length >= 7 ? 3 : n.length >= 4 ? 2 : 1;
  for (let i=0; i<normPool.length; i++) {
    if (levenshtein(n, normPool[i]) <= maxDist) {
      return { ok:true, reason:'נכון! (התכוונת ל' + pool[i] + '?)' };
    }
  }

  // Partial/first-name match
  const answerWords = n.split(' ');
  for (let i=0; i<normPool.length; i++) {
    const dbWords = normPool[i].split(' ');
    const firstDist = levenshtein(answerWords[0], dbWords[0]);
    const firstMax = answerWords[0].length >= 4 ? 2 : 1;
    if (firstDist <= firstMax) {
      if (answerWords.length === 1) return { ok:true, reason:'נכון! (התכוונת ל' + pool[i] + '?)' };
      if (dbWords.length > 1 && levenshtein(answerWords[answerWords.length-1], dbWords[dbWords.length-1]) <= 2) {
        return { ok:true, reason:'נכון! (התכוונת ל' + pool[i] + '?)' };
      }
    }
  }

  return { ok:false, reason:'לא מוכר — נסי שוב!' };
}

function submitAnswers() {
  clearInterval(G.timerInterval);
  const answers = {};
  CATEGORIES.forEach(cat => {
    const el = document.getElementById('inp-'+cat.key);
    answers[cat.key] = (el ? el.value.trim() : '') || G.answers[cat.key] || '';
  });

  let pts = 0;
  const results = [];
  CATEGORIES.forEach(cat => {
    const ans = answers[cat.key];
    const r = checkAnswer(G.letter, cat.key, ans);
    results.push({ cat, ans, ...r });
    if (r.ok) pts++;
  });
  G.score += pts;
  G.roundResults = results;
  G.screen = 'result';
  render();
}


function render() {
  const app = document.getElementById('app');

  if (G.screen === 'start') {
    app.innerHTML = `
      <div class="card">
        <div class="start-screen">
          <div style="font-size:3rem;margin-bottom:12px">🎮</div>
          <p style="color:#555;margin-bottom:8px;font-size:1rem;line-height:1.6"><strong>שלום נוגה!</strong><br>ברוכה הבאה למשחק ארץ עיר המיוחד שלך!</p>
          <p style="color:#777;font-size:0.9rem;margin-bottom:4px">בכל סיבוב — לוחצים הזנקה, האות מסתובבת,<br>ולוחצים שוב לעצור! (או מחכים 10 שניות)</p>
          <div class="cats-preview">
            ${CATEGORIES.map(c=>`<span class="cat-chip">${c.emoji} ${c.label}</span>`).join('')}
          </div>
          <p style="color:#888;font-size:0.9rem">סה"כ <strong>${G.totalRounds} סיבובים</strong> — בהצלחה! 🍀</p>
          <button class="btn btn-primary" onclick="G.round=0;G.score=0;G.screen='spin';render()">בואי נתחיל! 🚀</button>
        </div>
      </div>`;

  } else if (G.screen === 'spin') {
    G.round++;
    G.spinning = false;
    G.spinCurrentLetter = HEBREW_LETTERS[Math.floor(Math.random()*HEBREW_LETTERS.length)];
    G.screen = 'spinning';
    renderSpinScreen(app);

  } else if (G.screen === 'spinning') {
    renderSpinScreen(app);

  } else if (G.screen === 'play') {
    app.innerHTML = `
      <div class="score-bar">
        <div class="score-item"><div class="score-num">${G.round}/${G.totalRounds}</div><div class="score-label">סיבוב</div></div>
        <div class="score-item"><div class="score-num">האות: <span style="color:var(--coral)">${G.letter}</span></div><div class="score-label">מלאי תשובות!</div></div>
        <div class="score-item"><div class="score-num">⭐ ${G.score}</div><div class="score-label">נקודות</div></div>
      </div>
      <div class="card">
        <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
        <div class="timer-text" id="timer-text" style="margin-bottom:14px">60 שניות</div>
        <div class="categories">
          ${CATEGORIES.map((cat,i)=>`
            <div class="cat-input">
              <label class="cat-label"><span>${cat.emoji}</span>${cat.label}</label>
              <input type="text" placeholder="ב-${G.letter}..." id="inp-${cat.key}"
                oninput="G.answers['${cat.key}']=this.value"
                onkeydown="if(event.key==='Enter'){event.preventDefault();${i<CATEGORIES.length-1?`var n=document.getElementById('inp-${CATEGORIES[i+1].key}');if(n)n.focus()`:'submitAnswers()'}}"
                autocomplete="off" autocorrect="off" spellcheck="false" />
            </div>`).join('')}
        </div>
        <button class="btn btn-primary" onclick="submitAnswers()">סיימתי! ✋</button>
      </div>`;
    setTimeout(()=>{ const f=document.getElementById('inp-'+CATEGORIES[0].key); if(f)f.focus(); },100);
    G.timeLeft = 60;
    clearInterval(G.timerInterval);
    G.timerInterval = setInterval(function() {
      G.timeLeft--;
      const bar = document.getElementById('timer-bar');
      const txt = document.getElementById('timer-text');
      if (bar) bar.style.width = (G.timeLeft / 60 * 100) + '%';
      if (bar) bar.style.background = G.timeLeft <= 10 ? '#e74c3c' : 'var(--coral)';
      if (txt) txt.textContent = G.timeLeft + ' שניות';
      if (G.timeLeft <= 0) { clearInterval(G.timerInterval); submitAnswers(); }
    }, 1000);

  } else if (G.screen === 'checking') {
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:40px 26px">
        <div style="font-size:3rem;margin-bottom:16px;animation:spin 1s linear infinite;display:inline-block">🤖</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#333;margin-bottom:8px">Claude בודק...</div>
        <div style="color:#888;font-size:0.9rem">שניה, AI קורא את התשובות שלך!</div>
      </div>`;

  } else if (G.screen === 'result') {
    const correct = G.roundResults.filter(r=>r.ok).length;
    const msgs = correct===CATEGORIES.length?['וואו, מושלם!','🎉']:correct>=5?['כל הכבוד!','👍']:correct>=3?['יפה מאוד!','😊']:['המשיכי לנסות!','💪'];
    app.innerHTML = `
      <div class="card">
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:2.2rem">${msgs[1]}</div>
          <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#333;margin:4px 0">${msgs[0]}</div>
          <div style="color:#888;font-size:0.88rem">ענית נכון ${correct} מתוך ${CATEGORIES.length}</div>
        </div>
        ${G.roundResults.map(r=>`
          <div class="result-row ${r.ok?'ok':'bad'}">
            <span>${r.ok?'✅':'❌'}</span>
            <span><strong>${r.cat.emoji} ${r.cat.label}:</strong> ${r.ans||'—'}</span>
            <span style="font-size:0.78rem;opacity:0.75;margin-right:auto">${r.reason||''}</span>
          </div>`).join('')}
        <button class="btn ${G.round>=G.totalRounds?'btn-secondary':'btn-primary'}"
          onclick="${G.round>=G.totalRounds?'showEnd()':'G.screen=\'spin\';render()'}">
          ${G.round>=G.totalRounds?'לראות ציון סופי 🏆':'סיבוב הבא ➡️'}
        </button>
      </div>`;

  } else if (G.screen === 'end') {
    const max = G.totalRounds * CATEGORIES.length;
    const pct = Math.round((G.score/max)*100);
    const [msg,emoji] = pct===100?['מושלמת! גאון אמיתי!','👑']:pct>=80?['מדהים! כל הכבוד נוגה!','🌟']:pct>=60?['יפה מאוד!','🎉']:pct>=40?['לא רע! תנסי שוב!','💪']:['כדאי לתרגל עוד!','😊'];
    app.innerHTML = `
      <div class="card">
        <div class="win-screen">
          <span class="big-emoji">${emoji}</span>
          <h2>${msg}</h2>
          <p>נוגה, קיבלת <strong>${G.score} מתוך ${max}</strong> נקודות! (${pct}%)</p>
          <div style="background:linear-gradient(135deg,#fff9c4,#ffe0b2);border-radius:16px;padding:16px;margin:16px 0">
            <div style="font-family:'Fredoka One',cursive;font-size:3rem;color:var(--coral)">${G.score} ⭐</div>
          </div>
          <button class="btn btn-primary" onclick="resetGame()">משחק חדש! 🎮</button>
        </div>
      </div>`;
  }
}

function renderSpinScreen(app) {
  app.innerHTML = `
    <div class="score-bar">
      <div class="score-item"><div class="score-num">${G.round}/${G.totalRounds}</div><div class="score-label">סיבוב</div></div>
      <div class="score-item"><div class="score-num">⭐ ${G.score}</div><div class="score-label">נקודות</div></div>
    </div>
    <div class="card">
      <div class="spin-section">
        <div class="round-label">הגרלת האות</div>
        <div class="spin-drum-wrap">
          <div class="spin-glow"></div>
          <div class="spin-drum" id="spinDrum" style="font-size:3rem;background:linear-gradient(135deg,#bbb,#999)">?</div>
        </div>
        <div class="spin-countdown" id="spinCountdown">לחצי הזנקה להתחיל!</div>
        <div class="letter-reveal" id="letterReveal" style="display:none"></div>
        <button class="btn-spin" id="spinBtn" onclick="startSpin()">🎰 הזנקה!</button>
      </div>
    </div>`;
}

function startSpin() {
  if (G.spinning) {
    clearInterval(G.spinInterval);
    clearInterval(G.spinCountdownInterval);
    G.spinning = false;
    G.letter = G.spinCurrentLetter;
    const drum = document.getElementById('spinDrum');
    const reveal = document.getElementById('letterReveal');
    const btn = document.getElementById('spinBtn');
    const countdown = document.getElementById('spinCountdown');
    if (drum) { drum.textContent = G.letter; drum.style.background = 'linear-gradient(135deg,var(--coral),var(--orange))'; drum.style.color = '#fff'; }
    if (reveal) { reveal.style.display = 'block'; reveal.textContent = 'האות היא: ' + G.letter + '!'; }
    if (countdown) countdown.textContent = '';
    if (btn) { btn.textContent = 'בואי נתחיל לענות! ✍️'; btn.onclick = function(){ G.screen='play'; G.round++; render(); }; }
  } else {
    G.spinning = true;
    G.spinCountdown = 10;
    const btn = document.getElementById('spinBtn');
    const countdown = document.getElementById('spinCountdown');
    if (btn) btn.textContent = '⏹ עצור!';
    G.spinInterval = setInterval(function() {
      G.spinCurrentLetter = HEBREW_LETTERS[Math.floor(Math.random() * HEBREW_LETTERS.length)];
      const drum = document.getElementById('spinDrum');
      if (drum) { drum.textContent = G.spinCurrentLetter; drum.style.background = 'linear-gradient(135deg,var(--purple),var(--coral))'; drum.style.color = '#fff'; }
    }, 80);
    G.spinCountdownInterval = setInterval(function() {
      G.spinCountdown--;
      if (countdown) countdown.textContent = 'עוצר בעוד ' + G.spinCountdown + ' שניות...';
      if (G.spinCountdown <= 0) { startSpin(); }
    }, 1000);
  }
}

function showEnd() { G.screen='end'; render(); }

function resetGame() {
  clearInterval(G.timerInterval);
  clearInterval(G.spinInterval);
  clearInterval(G.spinCountdownInterval);
  G = { screen:'start', round:0, totalRounds:5, letter:'', answers:{}, score:0, roundResults:[], timeLeft:60, timerInterval:null, spinning:false, spinInterval:null, spinCountdown:10, spinCountdownInterval:null, spinCurrentLetter:'א' };
  render();
}

// Background floats
const bgEl = document.getElementById('bgFloats');
const floatEmojis = ['🌍','🏙️','🐾','🍎','🌿','🧑‍🎤','👩‍🎤','⭐','🎮','✨'];
for (let i=0;i<18;i++) {
  const s = document.createElement('span');
  s.textContent = floatEmojis[i % floatEmojis.length];
  s.style.left = Math.random()*100+'vw';
  s.style.fontSize = (1+Math.random()*1.5)+'rem';
  s.style.animationDuration = (14+Math.random()*20)+'s';
  s.style.animationDelay = (Math.random()*18)+'s';
  bgEl.appendChild(s);
}

let G = { screen:'start', round:0, totalRounds:5, letter:'', answers:{}, score:0, roundResults:[], timeLeft:60, timerInterval:null, spinning:false, spinInterval:null, spinCountdown:10, spinCountdownInterval:null, spinCurrentLetter:'א' };
render();
</script>
